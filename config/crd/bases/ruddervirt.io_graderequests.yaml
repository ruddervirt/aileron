---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: graderequests.ruddervirt.io
spec:
  group: ruddervirt.io
  names:
    kind: GradeRequest
    listKind: GradeRequestList
    plural: graderequests
    shortNames:
    - gr
    singular: graderequest
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          GradeRequest is the Schema for the graderequests API. It executes commands
          on one or more VMs via their serial console and records the results.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              GradeRequestSpec defines the desired state of a grade request.
              Use the VMs field for multi-VM grading. The legacy single-VM fields
              (VMName, Commands, User, Password, Domain) are still accepted for backward
              compatibility and are normalized into a one-element VMs slice by the
              controller.
            properties:
              commands:
                items:
                  type: string
                type: array
              domain:
                type: string
              namespace:
                description: namespace is the Kubernetes namespace containing the
                  target VMs.
                type: string
              password:
                type: string
              user:
                type: string
              vmName:
                description: Legacy single-VM fields (kept for backward compatibility).
                type: string
              vms:
                description: vms is the list of VMs to grade.
                items:
                  description: |-
                    GradeVM defines a single VM target within a grade request. The grading
                    method (serial-Windows vs serial-Linux) is resolved by the controller from
                    the VM's ruddervirt.io/os label, so callers don't specify it.
                  properties:
                    commands:
                      description: commands are executed sequentially on the VM's
                        serial console.
                      items:
                        type: string
                      type: array
                    domain:
                      description: domain is the optional SAC domain for domain-joined
                        Windows guests.
                      type: string
                    name:
                      description: name is the full KubeVirt VirtualMachine name to
                        grade.
                      type: string
                    password:
                      description: password is the serial console login password.
                      type: string
                    user:
                      description: user is the serial console login username.
                      type: string
                  required:
                  - commands
                  - name
                  - password
                  - user
                  type: object
                type: array
            required:
            - namespace
            type: object
          status:
            description: GradeRequestStatus defines the observed state of a grade
              request.
            properties:
              completedAt:
                format: date-time
                type: string
              message:
                type: string
              phase:
                description: GradeRequestPhase represents the current phase of a grade
                  request.
                enum:
                - Pending
                - Running
                - Ready
                - Failed
                type: string
              startedAt:
                format: date-time
                type: string
              vmStatuses:
                items:
                  description: GradeVMStatus tracks the status of grading a single
                    VM.
                  properties:
                    autoStarted:
                      description: |-
                        autoStarted is true when the operator powered this VM on because it was
                        off at grade time. Only auto-started VMs are powered back off after
                        grading; VMs that were already running are left running.
                      type: boolean
                    bootStartedAt:
                      description: |-
                        bootStartedAt records when the operator issued the power-on, so the
                        post-boot grace period can be enforced across reconciles.
                      format: date-time
                      type: string
                    jobName:
                      type: string
                    message:
                      type: string
                    name:
                      type: string
                    phase:
                      description: GradeRequestPhase represents the current phase
                        of a grade request.
                      enum:
                      - Pending
                      - Running
                      - Ready
                      - Failed
                      type: string
                    poweredOff:
                      description: |-
                        poweredOff is true once the operator has powered an auto-started VM
                        back off (or decided to leave it running), making power-off idempotent.
                      type: boolean
                    results:
                      items:
                        description: GradeCommandResult contains the result of a single
                          command execution.
                        properties:
                          exitCode:
                            format: int32
                            type: integer
                          stderr:
                            type: string
                          stdout:
                            type: string
                        required:
                        - exitCode
                        - stderr
                        - stdout
                        type: object
                      type: array
                  required:
                  - name
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
