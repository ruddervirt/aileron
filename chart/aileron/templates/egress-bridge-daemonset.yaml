{{- if .Values.egressExternal.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "aileron.fullname" . }}-egress-bridge
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aileron.labels" . | nindent 4 }}
    app.kubernetes.io/component: egress-bridge
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: egress-bridge
  template:
    metadata:
      annotations:
        timestamp: {{ now | quote }}
      labels:
        {{- include "aileron.labels" . | nindent 8 }}
        app.kubernetes.io/component: egress-bridge
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      hostNetwork: true
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: bridge-setup
          image: "{{ .Values.image.repository }}/egress-bridge:{{ include "aileron.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              BRIDGE="br-egress"
              GATEWAY="{{ .Values.egressExternal.gateway }}"
              CIDR="{{ .Values.egressExternal.cidr }}"
              PREFIX="$(echo "$CIDR" | cut -d/ -f2)"

              echo "Egress bridge setup starting: bridge=$BRIDGE gateway=$GATEWAY cidr=$CIDR"
              while true; do
                if ip link show "$BRIDGE" >/dev/null 2>&1; then
                  if ! ip addr show "$BRIDGE" | grep -q "$GATEWAY"; then
                    ip addr add "${GATEWAY}/${PREFIX}" dev "$BRIDGE" 2>/dev/null || true
                    echo "Assigned $GATEWAY to $BRIDGE"
                  fi

                  echo 1 > /proc/sys/net/ipv4/ip_forward

                  if ! iptables -t nat -C POSTROUTING -s "$CIDR" ! -d "$CIDR" -j MASQUERADE 2>/dev/null; then
                    iptables -t nat -A POSTROUTING -s "$CIDR" ! -d "$CIDR" -j MASQUERADE
                    echo "Added MASQUERADE rule for $CIDR"
                  fi
                else
                  echo "Waiting for $BRIDGE to appear..."
                fi

                sleep 30
              done
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
{{- end }}
