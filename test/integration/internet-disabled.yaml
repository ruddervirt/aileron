---
# Test: VPC with internet=false — VM should NOT have internet access.
# Curl should fail with a timeout/connection error.
apiVersion: ruddervirt.io/v1alpha1
kind: VirtualMachineBuild
metadata:
  name: test-internet-off
  namespace: ruddervirt-system
spec:
  network:
    vpcs:
      - name: vpc
        internet: false
    subnets:
      - name: default
        vpc: vpc
        cidr: "10.0.0.0/24"
  vms:
    - name: builder
      source:
        url: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2"
      resources:
        cpu: 1
        memory: "1Gi"
      disks:
        - name: rootdisk
          size: "4Gi"
      communicator:
        sshUsername: debian
      cloudInit:
        userData: |
          #cloud-config
          ssh_authorized_keys: []
      provisioners:
        - name: check-no-internet
          type: shell
          shell:
            inline:
              - echo "=== Testing that internet is blocked ==="
              - |
                if curl -sf --max-time 10 -o /dev/null http://deb.debian.org/debian/dists/bookworm/Release 2>/dev/null; then
                  echo "FAIL: internet is reachable but should be blocked"
                  exit 1
                else
                  echo "OK: internet is blocked as expected"
                fi
              - echo "=== No-internet test passed ==="

  timeout: 60m
