apiVersion: ruddervirt.io/v1alpha1
kind: VirtualMachineBuild
metadata:
  name: base-windows11
  namespace: ruddervirt-system
spec:
  timeout: "8h"
  # buildOverrides:
  #   vms:
  #     - name: builder
  #       resources:
  #         cpu: 8
  #         memory: "16384Mi"

  files:
    # --- Floppy files ---
    - name: Autounattend.xml
      inline: |
        <?xml version="1.0" encoding="utf-8"?>
        <unattend xmlns="urn:schemas-microsoft-com:unattend">
            <settings pass="specialize">
                <component name="Microsoft-Windows-Shell-Setup" processorArchitecture="amd64"
                    publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS"
                    xmlns:wcm="http://schemas.microsoft.com/WMIConfig/2002/State"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
                    <ComputerName>skillsusa</ComputerName>
                    <RegisteredOrganization>Microsoft</RegisteredOrganization>
                    <TimeZone>Eastern Standard Time</TimeZone>
                </component>
                <component name="Microsoft-Windows-Security-SPP-UX" processorArchitecture="amd64"
                    publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS"
                    xmlns:wcm="http://schemas.microsoft.com/WMIConfig/2002/State"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
                    <SkipAutoActivation>true</SkipAutoActivation>
                </component>
            </settings>
            <settings pass="windowsPE">
                <component name="Microsoft-Windows-PnpCustomizationsWinPE" publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS" processorArchitecture="amd64" xmlns:wcm="http://schemas.microsoft.com/WMIConfig/2002/State">
                    <DriverPaths>
                        <PathAndCredentials wcm:action="add" wcm:keyValue="1"><Path>%configsetroot%\</Path></PathAndCredentials>
                    </DriverPaths>
                </component>
                <component name="Microsoft-Windows-Setup" processorArchitecture="amd64"
                    publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS"
                    xmlns:wcm="http://schemas.microsoft.com/WMIConfig/2002/State"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
                    <DiskConfiguration>
                        <Disk wcm:action="add">
                            <CreatePartitions>
                                <CreatePartition wcm:action="add">
                                    <Order>2</Order>
                                    <Size>100</Size>
                                    <Type>EFI</Type>
                                </CreatePartition>
                                <CreatePartition wcm:action="add">
                                    <Order>1</Order>
                                    <Size>500</Size>
                                    <Type>Primary</Type>
                                </CreatePartition>
                                <CreatePartition wcm:action="add">
                                    <Order>3</Order>
                                    <Size>16</Size>
                                    <Type>MSR</Type>
                                </CreatePartition>
                                <CreatePartition wcm:action="add">
                                    <Order>4</Order>
                                    <Extend>true</Extend>
                                    <Type>Primary</Type>
                                </CreatePartition>
                            </CreatePartitions>
                            <ModifyPartitions>
                                <ModifyPartition wcm:action="add">
                                    <Order>1</Order>
                                    <Label>WinRE</Label>
                                    <Format>NTFS</Format>
                                    <TypeID>DE94BBA4-06D1-4D40-A16A-BFD50179D6AC</TypeID>
                                    <PartitionID>1</PartitionID>
                                </ModifyPartition>
                                <ModifyPartition wcm:action="add">
                                    <PartitionID>2</PartitionID>
                                    <Order>2</Order>
                                    <Format>FAT32</Format>
                                    <Label>System</Label>
                                </ModifyPartition>
                                <ModifyPartition wcm:action="add">
                                    <Order>3</Order>
                                    <PartitionID>3</PartitionID>
                                </ModifyPartition>
                                <ModifyPartition wcm:action="add">
                                    <Format>NTFS</Format>
                                    <Label>Windows</Label>
                                    <Letter>C</Letter>
                                    <Order>4</Order>
                                    <PartitionID>4</PartitionID>
                                </ModifyPartition>
                            </ModifyPartitions>
                            <WillWipeDisk>true</WillWipeDisk>
                            <DiskID>0</DiskID>
                        </Disk>
                        <WillShowUI>OnError</WillShowUI>
                    </DiskConfiguration>
                    <DynamicUpdate>
                        <Enable>true</Enable>
                    </DynamicUpdate>
                    <ImageInstall>
                        <OSImage>
                            <InstallTo>
                                <DiskID>0</DiskID>
                                <PartitionID>4</PartitionID>
                            </InstallTo>
                            <WillShowUI>OnError</WillShowUI>
                            <InstallToAvailablePartition>false</InstallToAvailablePartition>
                            <InstallFrom>
                                <MetaData wcm:action="add">
                                    <Key>/image/index</Key>
                                    <Value>1</Value>
                                </MetaData>
                            </InstallFrom>
                        </OSImage>
                    </ImageInstall>
                    <UserData>
                        <AcceptEula>true</AcceptEula>
                        <FullName>SkillsUSA</FullName>
                        <Organization>SkillsUSA</Organization>
                        <ProductKey>
                            <Key></Key>
                        </ProductKey>
                    </UserData>
                </component>
                <component name="Microsoft-Windows-International-Core-WinPE" processorArchitecture="amd64"
                    publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS"
                    xmlns:wcm="http://schemas.microsoft.com/WMIConfig/2002/State"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
                    <SetupUILanguage>
                        <UILanguage>en-US</UILanguage>
                    </SetupUILanguage>
                    <InputLocale>en-US</InputLocale>
                    <SystemLocale>en-US</SystemLocale>
                    <UILanguage>en-US</UILanguage>
                    <UILanguageFallback>en-US</UILanguageFallback>
                    <UserLocale>en-US</UserLocale>
                </component>
            </settings>
            <settings pass="oobeSystem">
                <component name="Microsoft-Windows-International-Core" processorArchitecture="amd64"
                    publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS"
                    xmlns:wcm="http://schemas.microsoft.com/WMIConfig/2002/State"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
                    <InputLocale>en-US</InputLocale>
                    <SystemLocale>en-US</SystemLocale>
                    <UILanguage>en-US</UILanguage>
                    <UILanguageFallback>en-US</UILanguageFallback>
                    <UserLocale>en-US</UserLocale>
                </component>
                <component name="Microsoft-Windows-Shell-Setup" processorArchitecture="amd64"
                    publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS"
                    xmlns:wcm="http://schemas.microsoft.com/WMIConfig/2002/State"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
                    <AutoLogon>
                        <Password>
                            <Value>skills</Value>
                            <PlainText>true</PlainText>
                        </Password>
                        <Username>skills</Username>
                        <Enabled>true</Enabled>
                    </AutoLogon>
                    <FirstLogonCommands>
                        <SynchronousCommand wcm:action="add">
                            <CommandLine>powershell -NoLogo -ExecutionPolicy Bypass -Command "foreach ($d in 'A','B','C','D','E','F') { $p = \"${d}:\configure-openssh.ps1\"; if (Test-Path $p) { &amp; $p; break } }"</CommandLine>
                            <Description>Install and configure OpenSSH for packer communicator</Description>
                            <Order>1</Order>
                            <RequiresUserInput>false</RequiresUserInput>
                        </SynchronousCommand>
                    </FirstLogonCommands>
                    <OOBE>
                        <ProtectYourPC>1</ProtectYourPC>
                        <NetworkLocation>Home</NetworkLocation>
                    </OOBE>
                    <UserAccounts>
                        <LocalAccounts>
                            <LocalAccount wcm:action="add">
                                <Password>
                                    <Value>skills</Value>
                                    <PlainText>true</PlainText>
                                </Password>
                                <Description>skills User</Description>
                                <DisplayName>skills</DisplayName>
                                <Group>Administrators</Group>
                                <Name>skills</Name>
                            </LocalAccount>
                        </LocalAccounts>
                    </UserAccounts>
                </component>
            </settings>
            <settings pass="offlineServicing">
                <component name="Microsoft-Windows-LUA-Settings" processorArchitecture="amd64"
                    publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS"
                    xmlns:wcm="http://schemas.microsoft.com/WMIConfig/2002/State"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
                    <EnableLUA>false</EnableLUA>
                </component>
            </settings>
        </unattend>

    - name: configure-openssh.ps1
      inline: |
        iex ((New-Object System.Net.WebClient).DownloadString('https://chocolatey.org/install.ps1'))
        choco install openssh --pre --version=9.2.2-beta1 -y
        . "C:\Program Files\OpenSSH-Win64\install-sshd.ps1"
        New-NetFirewallRule -Protocol TCP -LocalPort 22 -Direction Inbound -Action Allow -DisplayName SSH
        Set-Service SSHD -StartupType Automatic
        Start-Service SSHD

    # Virtio network driver (netkvm) - host these and fill in URLs
    - name: netkvm.inf
      url: https://github.com/skillsusaits/aileron-artifacts/raw/refs/heads/main/windows11/netkvm.inf
    - name: netkvm.sys
      url: https://github.com/skillsusaits/aileron-artifacts/raw/refs/heads/main/windows11/netkvm.sys
    - name: netkvm.cat
      url: https://github.com/skillsusaits/aileron-artifacts/raw/refs/heads/main/windows11/netkvm.cat

    # Virtio SCSI driver (vioscsi) - host these and fill in URLs
    - name: vioscsi.inf
      url: https://github.com/skillsusaits/aileron-artifacts/raw/refs/heads/main/windows11/vioscsi.inf
    - name: vioscsi.sys
      url: https://github.com/skillsusaits/aileron-artifacts/raw/refs/heads/main/windows11/vioscsi.sys
    - name: vioscsi.cat
      url: https://github.com/skillsusaits/aileron-artifacts/raw/refs/heads/main/windows11/vioscsi.cat

