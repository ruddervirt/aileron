    - name: ruddergrade.exe
      url: "https://github.com/ruddervirt/ruddergrade/releases/download/v1.0.0/ruddergrade.exe"

    - name: rudder-multitool.exe
      url: "https://github.com/ruddervirt/rudder-multitool/releases/download/v0.0.1/rudder-multitool.exe"

  vms:
    - name: builder
      source:
        blank: true
      resources:
        cpu: 8
        memory: "16384Mi"
      disks:
        - name: rootdisk
          size: "25Gi"
          bus: scsi
      efiFirmware:
        secureBoot: false
      isos:
        - url: "https://dropbox.skillsusaits.org/i/tiny1123H2x64.iso"
          checksum: "f260e50bf9afafd8f972a729402a557aadcd3a227918fc566cf42d48aa723a85"
      floppy:
        files:
          - name: Autounattend.xml
          - name: configure-openssh.ps1
          - name: netkvm.inf
          - name: netkvm.sys
          - name: netkvm.cat
          - name: vioscsi.inf
          - name: vioscsi.sys
          - name: vioscsi.cat
      communicator:
        shell: powershell
        sshUsername: skills
        sshPassword: skills
        sshTimeout: "8h"
      bootCommand:
        - "<enter>"
        - "<wait1s>"
        - "<enter>"
        - "<wait1s>"
        - "<enter>"
        - "<enter>"
        - "<wait1s>"
        - "<enter>"
        - "<wait1s>"
        - "<enter>"
        - "<enter>"
        - "<wait1s>"
        - "<enter>"
        - "<wait1s>"
        - "<enter>"
        - "<enter>"
        - "<wait1s>"
        - "<enter>"
        - "<wait1s>"
        - "<enter>"
      provisioners:
        - name: install-updates
          type: windows-update
          windowsUpdate:
            searchCriteria: "BrowseOnly=0 and IsInstalled=0"
            filters:
              - "exclude:$_.Title -like '*Preview*'"
              - "include:$true"

        - name: install-guest-tools
          type: shell
          shell:
            inline:
              # - "choco install virtio-drivers -y --version=0.1.215.200"
              - "choco install sdelete -y --ignore-checksums"
              - "choco install autohotkey.portable -y"
              # - "Remove-Item -Recurse -Force -Path C:\\ProgramData\\chocolatey\\lib\\virtio-drivers\\tools\\virtio"

        # Phase 1.5: Reboot after driver install
        - name: reboot-after-drivers
          type: reboot

        # Phase 2: Upload certificates for code signing trust
        - name: upload-ca-cert
          type: file
          file:
            fileRef: ruddervirt_ca.crt
            destination: "C:\\Users\\skills\\ruddervirt_ca.crt"
        - name: upload-signing-cert
          type: file
          file:
            fileRef: ruddervirt.crt
            destination: "C:\\Users\\skills\\ruddervirt.crt"

        - name: powershell-ssh
          type: shell
          shell:
            inline:
              - 'New-ItemProperty -Path "HKLM:\SOFTWARE\OpenSSH" -Name DefaultShell -Value "C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe" -PropertyType String -Force'

        - name: skills-things
          type: shell
          shell:
            inline:
              # DNS, hostname, password, execution policy
              - |
                if (-not (Test-Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\DNSClient")) {
                  New-Item -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\DNSClient" -Force | Out-Null
                }
                Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\DNSClient" -Name "AppendToMultiLabelName" -Value 1 -Type DWord -Force
                Rename-Computer "SKILLS"
                wmic useraccount where "name='skills'" set PasswordExpires=FALSE
                Set-ExecutionPolicy -ExecutionPolicy Unrestricted -Force
              # Disable UI clutter
              - |
                Set-ItemProperty -Path HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Search -Name SearchBoxTaskbarMode -Value 0 -Type DWord -Force
                Get-AppxPackage -alluser *WindowsStore* | Remove-Appxpackage
                Set-ItemProperty -Path HKLM:\Software\Microsoft\Windows\CurrentVersion\policies\system -Name EnableLUA -Value 1
              # Performance and power
              - |
                Set-ItemProperty -Path 'HKLM:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects' -Name 'VisualFXSetting' -Value 2
                powercfg -h off
                Set-ItemProperty HKLM:\SYSTEM\CurrentControlSet\Control\Power\ -name HiberFileSizePercent -value 0
                Set-ItemProperty HKLM:\SYSTEM\CurrentControlSet\Control\Power\ -name HibernateEnabled -value 0
                powercfg -change -monitor-timeout-ac 0
              # Disable indexing and services
              - |
                Set-Service -StartupType Disabled "WSearch"
                Set-Service -StartupType Disabled "DoSvc"
                Set-WindowsReservedStorageState -State Disabled
              # Edge and notifications
              - |
                New-Item "HKLM:\SOFTWARE\Policies\Microsoft\Edge" -Force
                Set-ItemProperty -Path HKLM:\SOFTWARE\Policies\Microsoft\Edge -Name HideFirstRunExperience -Value 1
                New-Item -Path "HKCU:\Software\Policies\Microsoft\Windows" -Name "Explorer" -Force
                New-ItemProperty -Path "HKCU:\Software\Policies\Microsoft\Windows\Explorer" -Name "DisableNotificationCenter" -PropertyType "DWord" -Value 1
              # Network and boot
              - |
                New-Item -Path "HKLM:\System\CurrentControlSet\Control\Network\NewNetworkWindowOff" -Force
                netsh advfirewall firewall set rule group="Network Discovery" new enable=No
                bcdedit /set "{default}" bootmenupolicy legacy

        - name: exe-signer
          type: shell
          shell:
            inline:
              - |
                Import-Certificate -FilePath "C:\Users\skills\ruddervirt_ca.crt" -CertStoreLocation Cert:\LocalMachine\Root | Out-Null
                Import-Certificate -FilePath "C:\Users\skills\ruddervirt.crt" -CertStoreLocation Cert:\LocalMachine\Root | Out-Null
                Remove-Item -Path "C:\Users\skills\ruddervirt_ca.crt" -Force
                Remove-Item -Path "C:\Users\skills\ruddervirt.crt" -Force

        # Phase 3.5: Reboot after configuration
        - name: reboot-after-config
          type: reboot

        # Phase 4: Deploy executables
        - name: upload-ruddergrade
          type: file
          file:
            fileRef: ruddergrade.exe
            destination: "C:\\Windows\\system32\\ruddergrade.exe"

        - name: upload-rudder-multitool
          type: file
          file:
            fileRef: rudder-multitool.exe
            destination: "C:\\Windows\\system32\\rudder-multitool.exe"

        # Phase 5: Serial console + compact
        - name: serial-console
          type: shell
          shell:
            inline:
              - |
                Write-Host "Resolving EMS-SAC capability name..."
                $cap = Get-WindowsCapability -Online -Name Windows.Desktop.EMS-SAC.Tools* | Select-Object -First 1
                $capName = if ($cap) { $cap.Name } else { 'Windows.Desktop.EMS-SAC.Tools~~~~0.0.1.0' }
                Write-Host "Using capability: $capName (current state: $(if ($cap) { $cap.State } else { 'unknown (using backfill)' }))"
                if (Get-ScheduledTask -TaskName "AddTask" -ErrorAction SilentlyContinue) {
                  Write-Host "Removing stale scheduled task..."
                  Unregister-ScheduledTask -TaskName "AddTask" -Confirm:$false
                }
                $t = New-ScheduledTaskTrigger -At 23:59 -Once
                $u = New-ScheduledTaskPrincipal System
                $a = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-NoProfile -NonInteractive -Command `"Add-WindowsCapability -Online -Name $capName`""
                $k = Register-ScheduledTask -TaskPath \ -TaskName "AddTask" -Trigger $t -Principal $u -Action $a
                Start-ScheduledTask -TaskName AddTask
                Write-Host "Waiting for capability installation..."
                # InstallPending is a valid terminal state: CBS has staged the
                # payload but needs a reboot to finalize it. bcdedit /ems writes
                # BCD entries regardless, and the reboot-final step later in the
                # provisioner chain will complete CBS's work. Waiting for a
                # strict 'Installed' here deadlocks because the state can't flip
                # without the reboot, and the reboot can't happen until this
                # step exits.
                while ($true) {
                  $state = (Get-WindowsCapability -Online -Name $capName).State
                  if ($state -eq 'Installed' -or $state -eq 'InstallPending') {
                    Write-Host "Capability reached terminal state: $state"
                    break
                  }
                  $taskInfo = Get-ScheduledTaskInfo -TaskName "AddTask"
                  $taskState = (Get-ScheduledTask -TaskName "AddTask").State
                  Write-Host "Capability state: $state | Task state: $taskState | Last result: $($taskInfo.LastTaskResult) | Last run: $($taskInfo.LastRunTime)"
                  if ($taskState -eq "Ready" -and $taskInfo.LastTaskResult -ne 0) {
                    Write-Host "WARNING: Task exited with code $($taskInfo.LastTaskResult). Restarting..."
                    Start-ScheduledTask -TaskName AddTask
                  }
                  Write-Host "Still installing, sleeping 120s..."
                  Start-Sleep -Seconds 120
                }
                Write-Host "Capability install accepted. Removing scheduled task..."
                $k | Unregister-ScheduledTask -Confirm:$false
                Write-Host "Configuring EMS via bcdedit..."
                bcdedit /ems '{current}' on
                bcdedit /emssettings EMSPORT:1 EMSBAUDRATE:115200
                Write-Host "Done."
       
        - name: adminstrator.ps1
          type: shell
          shell:
            inline:
              - |
                net user Administrator /active:yes
                net user Administrator "skillsadmin!"
                $regPath = "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon\SpecialAccounts\UserList"
                if (-not (Test-Path $regPath)) { New-Item -Path $regPath -Force | Out-Null }
                New-ItemProperty -Path $regPath -Name "Administrator" -Value 0 -PropertyType DWORD -Force | Out-Null
         
        - name: disable-windows-update
          type: shell
          shell:
            inline:
              - |
                # Disable Windows Update services
                $services = @("BITS", "wuauserv", "UsoSvc", "uhssvc", "WaaSMedicSvc")
                foreach ($service in $services) {
                  Stop-Service -Name $service -Force -ErrorAction SilentlyContinue
                  Set-Service -Name $service -StartupType Disabled -ErrorAction SilentlyContinue
                }
                If (!(Test-Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU")) {
                  New-Item -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU" -Force | Out-Null
                }
                Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU" -Name "NoAutoUpdate" -Type DWord -Value 1
                Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU" -Name "AUOptions" -Type DWord -Value 1

        - name: compact
          type: shell
          shell:
            inline:
              - "Optimize-Volume -DriveLetter C -ReTrim -Verbose"

        # Final reboot
        - name: reboot-final
          type: reboot
