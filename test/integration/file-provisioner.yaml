---
apiVersion: ruddervirt.io/v1alpha1
kind: VirtualMachineBuild
metadata:
  name: test-file-prov
  namespace: ruddervirt-system
spec:
  files:
    - name: hello
      inline: |
        Hello from the file provisioner!
        This file was uploaded by aileron.
    - name: config
      inline: |
        [app]
        name = aileron-test
        version = 1.0
        enabled = true
  vms:
    - name: builder
      source:
        url: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2"
      resources:
        cpu: 1
        memory: "1Gi"
      disks:
        - name: rootdisk
          size: "4Gi"
      communicator:
        sshUsername: debian
      cloudInit:
        userData: |
          #cloud-config
          ssh_authorized_keys: []
      provisioners:
        - name: create-dir
          type: shell
          shell:
            inline:
              - mkdir -p /home/debian/aileron-test

        - name: upload-hello
          type: file
          file:
            fileRef: hello
            destination: /home/debian/aileron-test/hello.txt

        - name: upload-config
          type: file
          file:
            fileRef: config
            destination: /home/debian/aileron-test/config.conf

        - name: verify-files
          type: shell
          shell:
            inline:
              - echo "=== Verifying uploaded files ==="
              - cat /home/debian/aileron-test/hello.txt
              - grep "file provisioner" /home/debian/aileron-test/hello.txt
              - cat /home/debian/aileron-test/config.conf
              - grep "aileron-test" /home/debian/aileron-test/config.conf
              - echo "=== All file provisioner checks passed ==="

  timeout: 60m
