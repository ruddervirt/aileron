---
# Layered build: sources from test-simple output, verifies the base image
# works, then layers additional changes on top.
apiVersion: ruddervirt.io/v1alpha1
kind: VirtualMachineBuild
metadata:
  name: test-layered-simple
  namespace: ruddervirt-system
spec:
  vms:
    - name: builder
      source:
        buildRef:
          name: test-simple
          vmName: builder
      resources:
        cpu: 1
        memory: "1Gi"
      disks:
        - name: rootdisk
          size: "4Gi"
      communicator:
        sshUsername: debian
      cloudInit:
        userData: |
          #cloud-config
          ssh_authorized_keys: []
      provisioners:
        - name: verify-base
          type: shell
          shell:
            inline:
              - echo "=== Verifying base image from test-simple ==="
              - uname -a
              - cat /etc/os-release | head -3
              - echo "=== Base verified ==="
        - name: add-layer
          type: shell
          shell:
            inline:
              - echo "=== Adding layered content ==="
              - echo "layered-build-marker" | sudo tee /tmp/layer-marker
              - cat /tmp/layer-marker
              - echo "=== Layer added ==="
  timeout: 60m
