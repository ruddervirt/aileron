apiVersion: ruddervirt.io/v1alpha1
kind: VirtualMachineBuild
metadata:
  name: test-dual
  namespace: ruddervirt-system
spec:
  network:
    vpcs:
      - name: vpc
        internet: false
    subnets:
      - name: lan
        vpc: vpc
        cidr: "10.0.0.0/24"

  vms:
    - name: server
      source:
        url: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2"
      resources:
        cpu: 1
        memory: "1Gi"
      disks:
        - name: rootdisk
          size: "4Gi"
      communicator:
        sshUsername: debian
      cloudInit:
        userData: |
          #cloud-config
          ssh_authorized_keys: []
      nics:
        - name: lan0
          subnet: lan
          ip: "10.0.0.10"
      provisioners:
        - type: shell
          name: setup-server
          shell:
            inline:
              - echo "=== Server VM (10.0.0.10) ==="
              - hostname
              - ip -brief addr show

    - name: client
      source:
        url: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2"
      resources:
        cpu: 1
        memory: "1Gi"
      disks:
        - name: rootdisk
          size: "4Gi"
      communicator:
        sshUsername: debian
      cloudInit:
        userData: |
          #cloud-config
          ssh_authorized_keys: []
      nics:
        - name: lan0
          subnet: lan
          ip: "10.0.0.11"
      provisioners:
        - type: shell
          name: test-connectivity
          shell:
            inline:
              - echo "=== Client VM (10.0.0.11) ==="
              - hostname
              - ip -brief addr show
              - ping -c 3 10.0.0.10
              - echo "Inter-VM connectivity verified on isolated VPC"

  timeout: 30m
