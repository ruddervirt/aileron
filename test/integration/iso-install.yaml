---
# Integration test: ISO install with boot command
# Installs Debian from netinst ISO onto a blank disk using preseed automation.
apiVersion: ruddervirt.io/v1alpha1
kind: VirtualMachineBuild
metadata:
  name: test-iso-install
  namespace: ruddervirt-system
spec:
  network:
    subnets:
      - name: lan
        cidr: "10.0.0.0/24"
  files:
    - name: preseed.cfg
      inline: |
        # To see all available options execute this command once the install is done:
        # sudo less /var/log/installer/cdebconf/questions.dat
        # If you need information about an option use the command below (example for keymap):
        # grep -A 4 "keyboard-configuration/xkb-keymap" /var/log/installer/cdebconf/templates.dat

        # Use network mirror for package installation
        # d-i apt-setup/use_mirror boolean true

        # Automatic installation
        d-i auto-install/enable boolean true

        # "linux-server" is substituted by "linux-image-amd64"
        # Possible options : "linux-image-amd64"(default) or "linux-image-rt-amd64"
        d-i base-installer/kernel/override-image string linux-server

        # Configure hardware clock
        d-i clock-setup/utc boolean true
        d-i clock-setup/utc-auto boolean true

        # d-i console-setup/ask_detect boolean false

        # d-i debconf/frontend select noninteractive

        # Set OS locale
        d-i debian-installer/language string en
        d-i debian-installer/country string US
        d-i debian-installer/locale string en_US.UTF-8

        # d-i debian-installer/framebuffer boolean false

        # Reboot once the install is done
        d-i finish-install/reboot_in_progress note

        # Bootloader options
        d-i grub-installer/only_debian boolean true
        d-i grub-installer/with_other_os boolean true
        d-i grub-installer/bootdev string /dev/vda

        # Set the keyboard layout
        d-i keyboard-configuration/xkb-keymap select us

        # Mirror from which packages will be downloaded
        d-i mirror/country string manual
        d-i mirror/http/hostname string deb.debian.org
        d-i mirror/http/directory string /debian

        # Configure http proxy if needed "http://[[user][:pass]@]host[:port]/"
        d-i mirror/http/proxy string

        # Disk configuration
        d-i partman-efi/non_efi_system boolean true
        d-i partman-auto-lvm/guided_size string max
        d-i partman-auto/choose_recipe select atomic
        d-i partman-auto/method string lvm
        d-i partman-lvm/confirm boolean true
        d-i partman-lvm/confirm_nooverwrite boolean true
        d-i partman-lvm/device_remove_lvm boolean true
        d-i partman/choose_partition select finish
        d-i partman/confirm boolean true
        d-i partman/confirm_nooverwrite boolean true
        d-i partman/confirm_write_new_label boolean true

        # User configuration
        d-i passwd/root-login boolean false
        d-i passwd/user-fullname string skills
        d-i passwd/user-uid string 1000
        d-i passwd/user-password password skills
        d-i passwd/user-password-again password skills
        d-i passwd/username string skills

        # Extra packages to be installed
        d-i pkgsel/include string sudo qemu-guest-agent

        d-i pkgsel/install-language-support boolean false
        d-i pkgsel/update-policy select none

        # Whether to upgrade packages after debootstrap
        d-i pkgsel/upgrade select full-upgrade

        # Set timezone
        d-i time/zone string America/Chicago

        # Allow weak user password
        d-i user-setup/allow-password-weak boolean true

        # Home folder encryption
        d-i user-setup/encrypt-home boolean false

        # Do not scan additional CDs
        apt-cdrom-setup apt-setup/cdrom/set-first boolean false

        # Use network mirror
        apt-mirror-setup apt-setup/use_mirror boolean true

        # Disable polularity contest
        popularity-contest popularity-contest/participate boolean false

        # Select base install
        tasksel tasksel/first multiselect standard, ssh-server

        # Setup passwordless sudo for packer user
        d-i preseed/late_command string \
          in-target rm -rf /var/lib/apt/lists ; \
          in-target apt-get update ; \
          in-target apt-get -y upgrade ; \
          in-target apt-get -y dist-upgrade ; \
          in-target apt-get -y install vim systemd-resolved ; \
          in-target apt-get -y autoremove ; \
          in-target apt-get autoclean ; \
          in-target apt-get clean ; \
          echo "%sudo ALL=(ALL:ALL) NOPASSWD:ALL" > /target/etc/sudoers.d/passwordless && chmod 0440 /target/etc/sudoers.d/passwordless
  httpDirectory:
    files:
      - name: preseed.cfg
  vms:
    - name: builder
      source:
        blank: true
      resources:
        cpu: 2
        memory: "4Gi"
      disks:
        - name: rootdisk
          size: "25Gi"
      isos:
        - url: "https://cdimage.debian.org/cdimage/archive/12.9.0/amd64/iso-cd/debian-12.9.0-amd64-netinst.iso"
          checksum: "1257373c706d8c07e6917942736a865dfff557d21d76ea3040bb1039eb72a054"
      communicator:
        sshUsername: skills
        sshPassword: skills
        sshTimeout: 60m
      nics:
        - name: eth0
          subnet: lan
          ip: "10.0.0.10"
      efiFirmware:
        secureBoot: false
      bootCommand:
        # Wait for EFI GRUB menu to appear
        - "<wait20>"
        # Navigate: Advanced options > Automated install
        - "<down><down><enter>"
        - "<wait><down><down><enter>"
        # Wait for installer to boot and prompt for preseed URL
        - "<wait70>"
        # Clear any pre-populated field value, then type the preseed URL
        - "<leftCtrlOn>a<leftCtrlOff>"
        - "<wait>"
        - "http://{{ .HTTPIP }}:{{ .HTTPPort }}/preseed.cfg"
        - "<enter>"
      provisioners:
        - name: verify-install
          type: shell
          shell:
            executeCommand: "echo 'skills' | sudo -S sh -c '{{ .Command }}'"
            inline:
              - echo "=== Verifying Debian ISO install ==="
              - cat /etc/debian_version
              - uname -a
              - lsblk
              - BUILD_ID=$(cat /proc/sys/kernel/random/uuid) && echo "$BUILD_ID" > /etc/aileron-build-id && echo "AILERON_BUILD_ID=$BUILD_ID"
              - echo "=== ISO install test passed ==="

  timeout: 90m
