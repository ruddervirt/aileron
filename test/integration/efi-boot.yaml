apiVersion: ruddervirt.io/v1alpha1
kind: VirtualMachineBuild
metadata:
  name: test-efi
  namespace: ruddervirt-system
spec:
  vms:
    - name: builder
      source:
        url: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2"
      resources:
        cpu: 1
        memory: "1Gi"
      disks:
        - name: rootdisk
          size: "4Gi"
      communicator:
        sshUsername: debian
      cloudInit:
        userData: |
          #cloud-config
          ssh_authorized_keys: []
          runcmd:
            - echo "cloud-init done" > /tmp/cloud-init-complete
      efiFirmware:
        secureBoot: false
      provisioners:
        - name: verify-efi
          type: shell
          shell:
            inline:
              - echo "Checking EFI boot..."
              - ls -la /sys/firmware/efi && echo "EFI boot confirmed!" || exit 1
              - uname -a
              - echo "EFI build test passed!"
  timeout: "30m"
