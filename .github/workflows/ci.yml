name: ci

on:
    push:
        branches:
            - main
    pull_request:

env:
    IMAGE_REPO: ghcr.io/${{ github.repository }}

jobs:
    lint:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache-dependency-path: go.sum
            - name: Cache golangci-lint analysis
              uses: actions/cache@v4
              with:
                  path: ~/.cache/golangci-lint
                  key: golangci-lint-${{ runner.os }}-${{ hashFiles('.golangci.yml', 'go.sum') }}
                  restore-keys: |
                      golangci-lint-${{ runner.os }}-
            - run: make lint

    test:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache-dependency-path: go.sum
            - name: Cache envtest assets
              uses: actions/cache@v4
              with:
                  path: bin/k8s
                  key: envtest-${{ runner.os }}-1.36.0
            - run: make test

    e2e:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache-dependency-path: go.sum
            - uses: helm/kind-action@v1
              with:
                  install_only: true
            - run: make test-e2e

    # Build + push dev images on main only. PRs just gate on lint/test/e2e; image
    # builds run after merge. Deployment is release-driven (tag vX.Y.Z, see
    # release.yml) — no cluster deploy here.
    build:
        if: github.event_name == 'push'
        needs: [lint, test, e2e]
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            packages: write
            contents: read
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache-dependency-path: go.sum

            - uses: docker/setup-buildx-action@v3

            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push dev images
              env:
                  MOVE_LATEST: "true"
                  BAKE_FILES: -f docker-bake.hcl -f docker-bake.ci.hcl
              run: make push TAG="main-${GITHUB_SHA::7}"
